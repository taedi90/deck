name: CI PR

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build deck CLI
        run: go build -o ./deck ./cmd/deck

      - name: Validate JSON schema files are parseable
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          files = sorted((root / 'docs' / 'schemas').rglob('*.json'))
          if not files:
              print('No schema files found, skipping')
              raise SystemExit(0)

          for f in files:
              with f.open('r', encoding='utf-8') as fp:
                  json.load(fp)
              print(f'OK: {f}')
          PY

      - name: Run Go tests (if go.mod exists)
        run: |
          if [ -f go.mod ]; then
            go test ./...
          else
            echo "go.mod not found, skipping go test"
          fi

      - name: Run deck validate
        run: |
          if [ ! -f docs/examples/vagrant-smoke-install.yaml ]; then
            echo "docs/examples/vagrant-smoke-install.yaml not found"
            exit 1
          fi
          ./deck validate --file docs/examples/vagrant-smoke-install.yaml
          ./deck validate --file test/workflows/k8s-control-plane-bootstrap/profile/control-plane.yaml
          ./deck validate --file test/workflows/k8s-worker-join/profile/worker.yaml
          ./deck validate --file test/workflows/k8s-node-reset/profile/node-reset.yaml

      - name: Validate docs examples (mode=validate)
        run: |
          while IFS=$'\t' read -r file mode; do
            if [ -z "${file}" ] || [ "${file#\#}" != "${file}" ]; then
              continue
            fi
            if [ "${mode}" != "validate" ]; then
              continue
            fi

            example_path="docs/examples/${file}"
            if [ ! -f "${example_path}" ]; then
              echo "missing example case: ${example_path}"
              exit 1
            fi

            echo "validating ${example_path}"
            ./deck validate --file "${example_path}"
          done < docs/examples/cases.tsv

      - name: Run L2 prepare backend integration checks
        run: |
          go test ./internal/prepare -run 'TestRun_ContainerBackendsWithFakeRunner|TestRun_PrepareArtifactsAndManifest|TestRun_DownloadFileFallbackLocalThenBundle|TestRun_DownloadFileFallbackRepoThenOnline|TestRun_DownloadFileOfflinePolicyBlocksOnlineFallback|TestRun_DownloadFileOfflinePolicyBlocksDirectURL'
