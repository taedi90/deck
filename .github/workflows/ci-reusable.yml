name: CI Reusable

on:
  workflow_call:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build deck CLI
        run: make build

      - name: Run golangci-lint
        run: make lint

      - name: Verify generated schema artifacts
        run: |
          make generate
          git diff --exit-code

      - name: Run help and completion smoke
        run: |
          ./bin/deck --help
          ./bin/deck help completion
          ./bin/deck completion bash >/tmp/deck.bash
          test -s /tmp/deck.bash
          ./bin/deck completion zsh >/tmp/_deck
          test -s /tmp/_deck
          ./bin/deck completion fish >/tmp/deck.fish
          test -s /tmp/deck.fish
          ./bin/deck completion powershell >/tmp/deck.ps1
          test -s /tmp/deck.ps1
          ./bin/deck version
          ./bin/deck version --json

      - name: Validate JSON schema files are parseable
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          files = sorted((root / 'schemas').rglob('*.json'))
          if not files:
              print('No schema files found, skipping')
              raise SystemExit(0)

          for f in files:
              with f.open('r', encoding='utf-8') as fp:
                  json.load(fp)
              print(f'OK: {f}')
          PY

      - name: Run core test set
        run: |
          go test ./...
          ./bin/deck lint --file docs/examples/vagrant-smoke-install.yaml
          ./bin/deck lint --file test/workflows/scenarios/control-plane-bootstrap.yaml
          ./bin/deck lint --file test/workflows/scenarios/worker-join.yaml
          ./bin/deck lint --file test/workflows/scenarios/node-reset.yaml
          go test ./internal/prepare -run 'TestRun_ContainerBackendsWithFakeRunner|TestRun_PrepareArtifactsAndManifest|TestRun_FileFallbackLocalThenBundle|TestRun_FileFallbackRepoThenOnline|TestRun_FileOfflinePolicyBlocksOnlineFallback|TestRun_FileOfflinePolicyBlocksDirectURL'

      - name: Validate docs examples (mode=validate)
        run: |
          while IFS=$'\t' read -r file mode; do
            if [ -z "${file}" ] || [ "${file#\#}" != "${file}" ]; then
              continue
            fi
            if [ "${mode}" != "validate" ]; then
              continue
            fi

            example_path="docs/examples/${file}"
            if [ ! -f "${example_path}" ]; then
              echo "missing example case: ${example_path}"
              exit 1
            fi

            echo "linting ${example_path}"
            ./bin/deck lint --file "${example_path}"
          done < docs/examples/cases.tsv

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck (core)
        run: make vuln

      - name: Run govulncheck (ai)
        run: make vuln-ai
