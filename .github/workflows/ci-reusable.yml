name: CI Reusable

on:
  workflow_call:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build deck CLI
        run: go build -o ./deck ./cmd/deck

      - name: Run golangci-lint
        run: make lint

      - name: Validate JSON schema files are parseable
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          files = sorted((root / 'docs' / 'schemas').rglob('*.json'))
          if not files:
              print('No schema files found, skipping')
              raise SystemExit(0)

          for f in files:
              with f.open('r', encoding='utf-8') as fp:
                  json.load(fp)
              print(f'OK: {f}')
          PY

      - name: Run core test set
        run: |
          go test ./...
          ./deck validate --file test/workflows/scenarios/control-plane-bootstrap.yaml
          ./deck validate --file test/workflows/scenarios/worker-join.yaml
          ./deck validate --file test/workflows/scenarios/node-reset.yaml
          go test ./internal/prepare -run 'TestRun_ContainerBackendsWithFakeRunner|TestRun_PrepareArtifactsAndManifest|TestRun_DownloadFileFallbackLocalThenBundle|TestRun_DownloadFileFallbackRepoThenOnline|TestRun_DownloadFileOfflinePolicyBlocksOnlineFallback|TestRun_DownloadFileOfflinePolicyBlocksDirectURL'

      - name: Validate docs examples (mode=validate)
        run: |
          while IFS=$'\t' read -r file mode; do
            if [ -z "${file}" ] || [ "${file#\#}" != "${file}" ]; then
              continue
            fi
            if [ "${mode}" != "validate" ]; then
              continue
            fi

            example_path="docs/examples/${file}"
            if [ ! -f "${example_path}" ]; then
              echo "missing example case: ${example_path}"
              exit 1
            fi

            echo "validating ${example_path}"
            ./deck validate --file "${example_path}"
          done < docs/examples/cases.tsv
