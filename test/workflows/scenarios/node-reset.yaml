role: apply
version: v1alpha1
vars:
  clusterName: node-reset
  resetReason: node-reset-acceptance
  resetStatePath: /tmp/deck/reports/reset-state.txt
phases:
  - name: host-prereqs
    imports:
      - path: k8s/prereq.yaml
  - name: reset
    imports:
      - path: node-reset.yaml
  - name: verify
    steps:
      - id: reset-summary
        kind: Command
        spec:
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              [[ -f "{{ .vars.resetStatePath }}" ]]
