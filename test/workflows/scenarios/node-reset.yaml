role: apply
version: v1alpha1
varImports:
  - ../vars.yaml
vars:
  clusterName: node-reset
  resetReason: node-reset-acceptance
  resetStatePath: /tmp/deck/reports/reset-state.txt
phases:
  - name: install
    imports:
      - path: ../components/k8s/prereq.yaml
      - path: ../components/node-reset.yaml
    steps:
      - id: reset-summary
        apiVersion: deck/v1alpha1
        kind: Command
        spec:
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              [[ -f "{{ .vars.resetStatePath }}" ]]
