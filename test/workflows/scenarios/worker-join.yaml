role: apply
version: v1alpha1
varImports:
  - ../vars.yaml
vars:
  clusterName: worker-join
  joinSource: cluster-file
  joinFile: /tmp/deck/join.txt
phases:
  - name: install
    imports:
      - path: ../components/k8s/prereq.yaml
      - path: ../components/repo/offline-repo-debian.yaml
        when: vars.osFamily == "debian"
      - path: ../components/repo/offline-repo-rhel.yaml
        when: vars.osFamily == "rhel"
      - path: ../components/k8s/runtime-deps-debian.yaml
        when: vars.osFamily == "debian"
      - path: ../components/k8s/runtime-deps-rhel.yaml
        when: vars.osFamily == "rhel"
      - path: ../components/k8s/k8s-binaries.yaml
      - path: ../components/k8s/containerd-kubelet.yaml
      - path: ../components/worker-join.yaml
      - path: ../components/k8s/cni.yaml
