role: apply
version: v1alpha1
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: Swap
        spec:
          disable: true
          persist: false
      - id: prep-enable-ip-forward
        apiVersion: deck/v1alpha1
        kind: InstallFile
        spec:
          path: /etc/sysctl.d/99-kubernetes-ipforward.conf
          content: |
            net.ipv4.ip_forward = 1
      - id: prep-apply-ip-forward
        apiVersion: deck/v1alpha1
        kind: SysctlApply
        spec:
          file: /etc/sysctl.d/99-kubernetes-ipforward.conf
