steps:
  - id: prep-disable-swap
    kind: Swap
    spec:
      disable: true
      persist: false
  - id: prep-enable-ip-forward
    kind: WriteFile
    spec:
      path: /etc/sysctl.d/99-kubernetes-ipforward.conf
      content: |
        net.ipv4.ip_forward = 1
  - id: prep-apply-ip-forward
    kind: Sysctl
    spec:
      writeFile: /etc/sysctl.d/99-kubernetes-ipforward.conf
      values:
        net.ipv4.ip_forward: 1
      apply: true
