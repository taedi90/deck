steps:
  - id: extract-containerd-runtime-debian
    kind: ExtractArchive
    timeout: 20m
    spec:
      source:
        url: http://{{ .vars.serverURL }}/files/bin/linux/{{ .runtime.host.arch }}/containerd.tar.gz
      path: /usr/local
  - id: install-containerd-debian
    kind: CopyFile
    spec:
      source:
        path: /usr/local/bin/containerd
      path: /usr/bin/containerd
      mode: "0755"
  - id: install-ctr-debian
    kind: CopyFile
    spec:
      source:
        path: /usr/local/bin/ctr
      path: /usr/bin/ctr
      mode: "0755"
  - id: install-containerd-shim-runc-v2-debian
    kind: CopyFile
    spec:
      source:
        path: /usr/local/bin/containerd-shim-runc-v2
      path: /usr/bin/containerd-shim-runc-v2
      mode: "0755"
  - id: install-runc-debian
    kind: CopyFile
    spec:
      source:
        url: http://{{ .vars.serverURL }}/files/bin/linux/{{ .runtime.host.arch }}/runc
      path: /usr/local/sbin/runc
      mode: "0755"
  - id: extract-cni-plugins-debian
    kind: ExtractArchive
    spec:
      source:
        url: http://{{ .vars.serverURL }}/files/bin/linux/{{ .runtime.host.arch }}/cni-plugins.tgz
      path: /opt/cni/bin
  - id: symlink-runc-debian
    kind: CreateSymlink
    spec:
      path: /usr/bin/runc
      target: /usr/local/sbin/runc
      force: true
  - id: write-containerd-unit-debian
    kind: WriteSystemdUnit
    spec:
      path: /etc/systemd/system/containerd.service
      mode: "0644"
      content: |
        [Unit]
        Description=containerd container runtime
        Documentation=https://containerd.io
        After=network.target local-fs.target

        [Service]
        ExecStart=/usr/local/bin/containerd
        Type=notify
        Delegate=yes
        KillMode=process
        Restart=always
        RestartSec=5
        LimitNPROC=infinity
        LimitCORE=infinity
        LimitNOFILE=infinity
        TasksMax=infinity
        OOMScoreAdjust=-999

        [Install]
        WantedBy=multi-user.target
