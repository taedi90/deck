steps:
  - id: install-runtime-dependency-packages-debian
    kind: InstallPackage
    spec:
      packages: "{{ .vars.runtimeDepPackages.debian }}"
      restrictToRepos:
        - /etc/apt/sources.list.d/offline.list
  - id: stop-containerd-debian
    kind: ManageService
    spec:
      name: containerd
      state: stopped
  - id: extract-containerd-runtime-debian
    kind: ExtractArchive
    timeout: 20m
    spec:
      source: "{{ .vars.install.runtimeDeps.debian.extractContainerd.source }}"
      path: "{{ .vars.install.runtimeDeps.debian.extractContainerd.path }}"
  - id: install-containerd-debian
    kind: CopyFile
    spec:
      source:
        path: /usr/local/bin/containerd
      path: /usr/bin/containerd
      mode: "0755"
  - id: install-ctr-debian
    kind: CopyFile
    spec:
      source:
        path: /usr/local/bin/ctr
      path: /usr/bin/ctr
      mode: "0755"
  - id: install-containerd-shim-runc-v2-debian
    kind: CopyFile
    spec:
      source:
        path: /usr/local/bin/containerd-shim-runc-v2
      path: /usr/bin/containerd-shim-runc-v2
      mode: "0755"
  - id: install-runc-debian
    kind: CopyFile
    spec:
      source: "{{ .vars.install.runtimeDeps.debian.installRunc.source }}"
      path: "{{ .vars.install.runtimeDeps.debian.installRunc.path }}"
      mode: "{{ .vars.install.runtimeDeps.debian.installRunc.mode }}"
  - id: extract-cni-plugins-debian
    kind: ExtractArchive
    spec:
      source: "{{ .vars.install.runtimeDeps.debian.extractCNIPlugins.source }}"
      path: "{{ .vars.install.runtimeDeps.debian.extractCNIPlugins.path }}"
  - id: symlink-runc-debian
    kind: CreateSymlink
    spec:
      path: /usr/bin/runc
      target: /usr/local/sbin/runc
      force: true
  - id: write-containerd-unit-debian
    kind: WriteSystemdUnit
    spec:
      path: /etc/systemd/system/containerd.service
      mode: "0644"
      content: |
        [Unit]
        Description=containerd container runtime
        Documentation=https://containerd.io
        After=network.target local-fs.target

        [Service]
        ExecStart=/usr/local/bin/containerd
        Type=notify
        Delegate=yes
        KillMode=process
        Restart=always
        RestartSec=5
        LimitNPROC=infinity
        LimitCORE=infinity
        LimitNOFILE=infinity
        TasksMax=infinity
        OOMScoreAdjust=-999

        [Install]
        WantedBy=multi-user.target
