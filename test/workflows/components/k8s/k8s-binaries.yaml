steps:
  - id: install-kubelet
    kind: CopyFile
    spec:
      source: "{{ .vars.install.k8sBinaries.kubelet.source }}"
      path: "{{ .vars.install.k8sBinaries.kubelet.path }}"
      mode: "{{ .vars.install.k8sBinaries.kubelet.mode }}"
  - id: install-kubeadm
    kind: CopyFile
    spec:
      source: "{{ .vars.install.k8sBinaries.kubeadm.source }}"
      path: "{{ .vars.install.k8sBinaries.kubeadm.path }}"
      mode: "{{ .vars.install.k8sBinaries.kubeadm.mode }}"
  - id: install-kubectl
    kind: CopyFile
    spec:
      source: "{{ .vars.install.k8sBinaries.kubectl.source }}"
      path: "{{ .vars.install.k8sBinaries.kubectl.path }}"
      mode: "{{ .vars.install.k8sBinaries.kubectl.mode }}"
  - id: install-crictl
    kind: ExtractArchive
    spec:
      source: "{{ .vars.install.k8sBinaries.crictl.source }}"
      path: "{{ .vars.install.k8sBinaries.crictl.path }}"
      include: "{{ .vars.install.k8sBinaries.crictl.include }}"
      mode: "{{ .vars.install.k8sBinaries.crictl.mode }}"
