steps:
  - id: configure-containerd-runtime
    kind: WriteContainerdConfig
    spec:
      path: /etc/containerd/config.toml
      configPath: /etc/containerd/certs.d
      systemdCgroup: true
  - id: configure-containerd-registry-hosts
    kind: WriteContainerdRegistryHosts
    spec:
      path: /etc/containerd/certs.d
      registryHosts:
        - registry: registry.k8s.io
          server: https://registry.k8s.io
          host: http://{{ .vars.registryHost  }}
          capabilities: [pull, resolve]
          skipVerify: true
  - id: update-containerd-pause-image
    kind: EditFile
    spec:
      path: /etc/containerd/config.toml
      backup: false
      edits:
        - op: replace
          match: registry.k8s.io/pause:3.8
          replaceWith: registry.k8s.io/pause:3.9
  - id: restart-containerd
    kind: ManageService
    spec:
      name: containerd
      enabled: true
      state: restarted
  - id: ensure-kubelet-state-dir
    kind: EnsureDirectory
    spec:
      path: /var/lib/kubelet
  - id: ensure-kubelet-defaults-dir
    kind: EnsureDirectory
    spec:
      path: /etc/default
  - id: setup-kubelet-systemd
    kind: WriteSystemdUnit
    spec:
      path: /etc/systemd/system/kubelet.service
      mode: "0644"
      content: |
        [Unit]
        Description=kubelet
        Documentation=https://kubernetes.io/docs/
        Wants=network-online.target
        After=network-online.target

        [Service]
        EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
        EnvironmentFile=-/etc/default/kubelet
        ExecStart=/usr/bin/kubelet \
          --bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf \
          --kubeconfig=/etc/kubernetes/kubelet.conf \
          --config=/var/lib/kubelet/config.yaml \
          $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS
        Restart=always
        StartLimitInterval=0
        RestartSec=10

        [Install]
        WantedBy=multi-user.target
      daemonReload: true
  - id: start-kubelet
    kind: ManageService
    spec:
      name: kubelet
      enabled: true
      state: started
