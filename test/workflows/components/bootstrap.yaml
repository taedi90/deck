role: apply
version: v1alpha1
steps:
  - id: bootstrap-reset-preflight
    apiVersion: deck/v1alpha1
    kind: Kubeadm
    spec:
      action: reset
      force: true
      ignoreErrors: true
      criSocket: unix:///run/containerd/containerd.sock
      removePaths:
        - /etc/cni/net.d
        - /var/lib/etcd
        - /etc/kubernetes/manifests
        - /var/lib/kubelet/pki
      removeFiles:
        - /etc/kubernetes/admin.conf
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/controller-manager.conf
        - /etc/kubernetes/scheduler.conf
      cleanupContainers:
        - kube-apiserver
        - kube-controller-manager
        - kube-scheduler
        - etcd
      restartRuntimeService: containerd
  - id: bootstrap-runtime-ready
    apiVersion: deck/v1alpha1
    kind: Command
    spec:
      timeout: 5m
      command:
        - bash
        - -lc
        - |
          set -euo pipefail
          for i in $(seq 1 60); do
            if systemctl is-active --quiet containerd; then
              break
            fi
            sleep 2
          done
          systemctl is-active --quiet containerd
          for i in $(seq 1 60); do
            if crictl --runtime-endpoint unix:///run/containerd/containerd.sock info >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          crictl --runtime-endpoint unix:///run/containerd/containerd.sock info >/dev/null 2>&1
          for i in $(seq 1 30); do
            if ss -lnt | grep -E ':(10257|10259)\s' >/dev/null 2>&1; then
              sleep 2
              continue
            fi
            break
          done
          if ss -lnt | grep -E ':(10257|10259)\s' >/dev/null 2>&1; then
            echo "stale control-plane ports still in use" >&2
            ss -lntp | grep -E ':(10257|10259)\s' || true
            exit 1
          fi
          if ls /etc/kubernetes/manifests/*.yaml >/dev/null 2>&1; then
            echo "stale static pod manifests still present" >&2
            ls -l /etc/kubernetes/manifests || true
            exit 1
          fi
          systemctl enable --now kubelet
          systemctl is-active --quiet kubelet
  - id: bootstrap-init
    apiVersion: deck/v1alpha1
    kind: Kubeadm
    spec:
      action: init
      mode: real
      timeout: 20m
      configTemplate: default
      configFile: /tmp/deck/kubeadm-init.yaml
      pullImages: true
      outputJoinFile: /tmp/deck/join.txt
      kubernetesVersion: "{{ .vars.kubernetesVersion }}"
      advertiseAddress: auto
      podNetworkCIDR: 10.244.0.0/16
      criSocket: unix:///run/containerd/containerd.sock
      ignorePreflightErrors: [Swap, FileExisting-crictl, FileExisting-conntrack, FileExisting-socat, Port-10250]
  - id: bootstrap-publish-join-dir
    apiVersion: deck/v1alpha1
    kind: Directory
    spec:
      path: /tmp/deck/server-root/files/cluster
  - id: bootstrap-publish-join
    apiVersion: deck/v1alpha1
    kind: File
    spec:
      action: copy
      src: /tmp/deck/join.txt
      dest: /tmp/deck/server-root/files/cluster/join.txt
  - id: bootstrap-kubeconfig-ready
    apiVersion: deck/v1alpha1
    kind: Wait
    spec:
      action: fileExists
      timeout: 5m
      path: /etc/kubernetes/admin.conf
      type: file
      nonEmpty: true
  - id: bootstrap-offline-guard
    apiVersion: deck/v1alpha1
    kind: Command
    spec:
      command:
        - bash
        - -lc
        - |
          set -euo pipefail
          iptables -S OUTPUT | grep -F -- "-j DECK_OFFLINE_GUARD" >/dev/null
          iptables -S DECK_OFFLINE_GUARD >/dev/null
