steps:
  - id: bootstrap-reset-preflight
    kind: ResetKubeadm
    spec:
      force: true
      ignoreErrors: true
      criSocket: unix:///run/containerd/containerd.sock
      removePaths:
        - /etc/cni/net.d
        - /var/lib/etcd
        - /etc/kubernetes/manifests
        - /var/lib/kubelet/pki
      removeFiles:
        - /etc/kubernetes/admin.conf
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/controller-manager.conf
        - /etc/kubernetes/scheduler.conf
      cleanupContainers:
        - kube-apiserver
        - kube-controller-manager
        - kube-scheduler
        - etcd
      restartRuntimeService: containerd
  - id: bootstrap-runtime-service-ready
    kind: WaitForService
    spec:
      timeout: 5m
      interval: 2s
      name: containerd
  - id: bootstrap-runtime-cri-ready
    kind: WaitForCommand
    spec:
      timeout: 5m
      interval: 2s
      command: [crictl, --runtime-endpoint, unix:///run/containerd/containerd.sock, info]
  - id: bootstrap-controller-manager-port-closed
    kind: WaitForMissingTCPPort
    spec:
      timeout: 1m
      interval: 2s
      port: "10257"
  - id: bootstrap-scheduler-port-closed
    kind: WaitForMissingTCPPort
    spec:
      timeout: 1m
      interval: 2s
      port: "10259"
  - id: bootstrap-manifests-cleared
    kind: WaitForMissingFile
    spec:
      timeout: 1m
      interval: 2s
      glob: /etc/kubernetes/manifests/*.yaml
  - id: bootstrap-kubelet-ready
    kind: ManageService
    spec:
      name: kubelet
      enabled: true
      state: started
  - id: bootstrap-init
    kind: InitKubeadm
    timeout: 20m
    spec:
      configTemplate: default
      configFile: /tmp/deck/kubeadm-init.yaml
      outputJoinFile: /tmp/deck/join.txt
      kubernetesVersion: "{{ .vars.kubernetesVersion }}"
      advertiseAddress: auto
      podNetworkCIDR: 10.244.0.0/16
      criSocket: unix:///run/containerd/containerd.sock
      ignorePreflightErrors: [Swap, FileExisting-crictl, FileExisting-conntrack, FileExisting-socat, Port-10250]
  - id: bootstrap-publish-join-dir
    kind: EnsureDirectory
    spec:
      path: /tmp/deck/server-root/files/cluster
  - id: bootstrap-publish-join
    kind: CopyFile
    spec:
      source:
        path: /tmp/deck/join.txt
      path: /tmp/deck/server-root/files/cluster/join.txt
  - id: bootstrap-kubeconfig-ready
    kind: WaitForFile
    spec:
      timeout: 5m
      path: /etc/kubernetes/admin.conf
      type: file
      nonEmpty: true
  - id: bootstrap-offline-guard
    kind: Command
    spec:
      command:
        - bash
        - -lc
        - |
          set -euo pipefail
          iptables -S OUTPUT | grep -F -- "-j DECK_OFFLINE_GUARD" >/dev/null
          iptables -S DECK_OFFLINE_GUARD >/dev/null
