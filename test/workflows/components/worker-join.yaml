role: apply
version: v1alpha1
steps:
  - id: fetch-join-file
    apiVersion: deck/v1alpha1
    kind: FileFetch
    spec:
      source:
        bundle:
          root: files
          path: cluster/join.txt
      fetch:
        sources:
          - type: online
            url: http://{{ .vars.serverURL }}
      output:
        path: "{{ .vars.joinFile }}"
  - id: join-worker
    apiVersion: deck/v1alpha1
    kind: Kubeadm
    spec:
      action: join
      mode: real
      joinFile: "{{ .vars.joinFile }}"
      extraArgs: ["--cri-socket", "unix:///run/containerd/containerd.sock", "--ignore-preflight-errors=Swap,FileExisting-crictl,FileExisting-conntrack,FileExisting-socat"]
