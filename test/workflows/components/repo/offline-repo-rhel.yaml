role: apply
version: v1alpha1
phases:
  - name: install
    steps:
      - id: apply-offline-repo-config-rhel
        apiVersion: deck/v1alpha1
        kind: Repository
        spec:
          action: configure
          format: yum
          path: /etc/yum.repos.d/deck-offline.repo
          replaceExisting: true
          repositories:
            - id: deck-os
              name: deck-os
              baseurl: http://{{ .vars.serverURL  }}/packages/yum/{{ .vars.release  }}
              enabled: true
              gpgcheck: false
      - id: refresh-dnf-package-cache
        apiVersion: deck/v1alpha1
        kind: PackageCache
        spec:
          manager: dnf
          clean: true
          update: true
          restrictToRepos:
            - deck-os
