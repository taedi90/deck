role: apply
version: v1alpha1
phases:
  - name: install
    steps:
      - id: apply-offline-repo-config-debian
        apiVersion: deck/v1alpha1
        kind: Repository
        spec:
          action: configure
          format: apt
          path: /etc/apt/sources.list.d/offline.list
          replaceExisting: true
          repositories:
            - type: deb
              trusted: true
              baseurl: http://{{ .vars.serverURL  }}/packages/apt/{{ .vars.release  }}
              suite: ./
      - id: refresh-apt-package-cache
        apiVersion: deck/v1alpha1
        kind: PackageCache
        spec:
          manager: apt
          clean: true
          update: true
          restrictToRepos:
            - /etc/apt/sources.list.d/offline.list
