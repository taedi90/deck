role: pack
version: v1alpha1
steps:
  - id: runtime-deps-ubuntu2404
    apiVersion: deck/v1alpha1
    kind: DownloadPackages
    spec:
      distro:
        family: debian
        release: ubuntu2404
        arch: "{{ .vars.arch }}"
      repo:
        type: apt-flat
        generate: true
      packages: [containerd, containernetworking-plugins]
      backend:
        mode: container
        runtime: "{{ .vars.backendRuntime }}"
        image: ubuntu:24.04
