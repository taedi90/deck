role: prepare
version: v1alpha1
artifacts:
  packages:
    - group: runtime-deps-ubuntu2204
      targets:
        - osFamily: debian
          release: ubuntu2204
          arch: "{{ .vars.arch }}"
      repo:
        type: apt-flat
        generate: true
      backend:
        mode: container
        runtime: "{{ .vars.backendRuntime }}"
        image: ubuntu:22.04
      items:
        - name: containerd
        - name: containernetworking-plugins
