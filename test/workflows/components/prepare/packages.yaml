steps:
  - id: download-ubuntu2204-runtime-deps
    kind: DownloadPackage
    parallelGroup: distro-package-downloads
    spec:
      packages: "{{ .vars.runtimeDepPackages.debian }}"
      distro:
        family: debian
        release: ubuntu2204
      repo:
        type: deb-flat
        generate: true
      backend:
        mode: container
        runtime: auto
        image: ubuntu:22.04
      outputDir: packages/deb/ubuntu2204
  - id: download-ubuntu2404-runtime-deps
    kind: DownloadPackage
    parallelGroup: distro-package-downloads
    spec:
      packages: "{{ .vars.runtimeDepPackages.debian }}"
      distro:
        family: debian
        release: ubuntu2404
      repo:
        type: deb-flat
        generate: true
      backend:
        mode: container
        runtime: auto
        image: ubuntu:24.04
      outputDir: packages/deb/ubuntu2404
  - id: download-rocky9-runtime-deps
    kind: DownloadPackage
    parallelGroup: distro-package-downloads
    spec:
      packages: "{{ .vars.runtimeDepPackages.rhel }}"
      distro:
        family: rhel
        release: rocky9
      repo:
        type: rpm
        generate: true
      backend:
        mode: container
        runtime: auto
        image: rockylinux:9
      outputDir: packages/rpm/rocky9
