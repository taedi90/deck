role: prepare
version: v1alpha1
artifacts:
  packages:
    - group: runtime-deps-rocky9
      targets:
        - osFamily: rhel
          release: rocky9
          arch: "{{ .vars.arch }}"
      repo:
        type: yum
        generate: true
      backend:
        mode: container
        runtime: "{{ .vars.backendRuntime }}"
        image: rockylinux:9
      items:
        - name: bash
