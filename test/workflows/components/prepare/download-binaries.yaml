role: prepare
version: v1alpha1
artifacts:
  files:
    - group: kubernetes-binaries
      targets:
        - os: linux
          arch: amd64
        - os: linux
          arch: arm64
      items:
        - id: kubelet
          source:
            url: https://dl.k8s.io/release/{{ .vars.kubernetesVersion }}/bin/{{ .target.os }}/{{ .target.arch }}/kubelet
          output:
            path: bin/{{ .target.os }}/{{ .target.arch }}/kubelet
            mode: "0755"
        - id: kubeadm
          source:
            url: https://dl.k8s.io/release/{{ .vars.kubernetesVersion }}/bin/{{ .target.os }}/{{ .target.arch }}/kubeadm
          output:
            path: bin/{{ .target.os }}/{{ .target.arch }}/kubeadm
            mode: "0755"
        - id: kubectl
          source:
            url: https://dl.k8s.io/release/{{ .vars.kubernetesVersion }}/bin/{{ .target.os }}/{{ .target.arch }}/kubectl
          output:
            path: bin/{{ .target.os }}/{{ .target.arch }}/kubectl
            mode: "0755"
        - id: crictl
          source:
            url: https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.30.0/crictl-v1.30.0-linux-{{ .target.arch }}.tar.gz
          output:
            path: bin/{{ .target.os }}/{{ .target.arch }}/crictl.tar.gz
        - id: containerd
          source:
            url: https://github.com/containerd/containerd/releases/download/v1.7.18/containerd-1.7.18-linux-{{ .target.arch }}.tar.gz
          output:
            path: bin/{{ .target.os }}/{{ .target.arch }}/containerd.tar.gz
        - id: runc
          source:
            url: https://github.com/opencontainers/runc/releases/download/v1.1.13/runc.{{ .target.arch }}
          output:
            path: bin/{{ .target.os }}/{{ .target.arch }}/runc
            mode: "0755"
        - id: cni-plugins
          source:
            url: https://github.com/containernetworking/plugins/releases/download/v1.5.1/cni-plugins-linux-{{ .target.arch }}-v1.5.1.tgz
          output:
            path: bin/{{ .target.os }}/{{ .target.arch }}/cni-plugins.tgz
