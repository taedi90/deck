steps:
  - id: download-binaries
    kind: DownloadFile
    parallelGroup: binary-downloads
    spec:
      items: "{{ .vars.binaryDownloads }}"
  - id: download-upgrade-binaries
    kind: DownloadFile
    parallelGroup: binary-downloads
    when: vars.upgradeKubernetesVersion != ""
    spec:
      items: "{{ .vars.upgradeBinaryDownloads }}"
