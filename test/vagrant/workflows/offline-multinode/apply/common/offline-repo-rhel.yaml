role: apply
version: v1alpha1
phases:
  - name: install
    steps:
      - id: write-yum-offline-repo
        apiVersion: deck/v1alpha1
        kind: WriteFile
        spec:
          path: /tmp/deck-offline.repo
          mode: "0644"
          contentFromTemplate: |
            [deck-os]
            name=deck-os
            baseurl=http://{{ .vars.serverURL  }}/packages/yum/{{ .vars.release  }}
            enabled=1
            gpgcheck=0
      - id: apply-offline-repo-config-rhel
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              cp -f /tmp/deck-offline.repo /etc/yum.repos.d/deck-offline.repo
              dnf clean all
              dnf makecache || true
