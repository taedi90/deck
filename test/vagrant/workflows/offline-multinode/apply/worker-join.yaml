role: apply
version: v1alpha1
phases:
  - name: install
    steps:
      - id: fetch-join-file
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - bash
            - -lc
            - curl -fsSL http://{{ .vars.serverURL  }}/files/cluster/join.txt -o {{ .vars.joinFile  }}
      - id: join-worker
        apiVersion: deck/v1alpha1
        kind: KubeadmJoin
        spec:
          mode: real
          joinFile: "{{ .vars.joinFile  }}"
          extraArgs: ["--cri-socket", "unix:///run/containerd/containerd.sock", "--ignore-preflight-errors=Swap,FileExisting-crictl,FileExisting-conntrack,FileExisting-socat"]
