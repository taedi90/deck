version: v1alpha1
vars:
  serverURL: 192.168.56.1:8080
  release: ubuntu2204
  osFamily: debian
  registryHost: 192.168.56.1:5000
  kubernetesVersion: v1.30.1
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: Swap
        spec:
          disable: true
          persist: false
      - id: configure-offline-repo-apt
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: ConfigureRepository
        spec:
          format: apt
          replaceExisting: true
          repositories:
            - id: deck-os
              baseurl: http://{{ .vars.serverURL }}/packages/deb/{{ .vars.release }}
              trusted: true
            - id: deck-k8s
              baseurl: http://{{ .vars.serverURL }}/packages/deb-k8s/{{ .vars.release }}
              trusted: true
      - id: refresh-offline-repo-apt
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: RefreshRepository
        spec:
          manager: apt
          clean: true
          update: true
      - id: configure-offline-repo-yum
        when: vars.osFamily == "rhel"
        apiVersion: deck/v1alpha1
        kind: ConfigureRepository
        spec:
          format: yum
          replaceExisting: true
          repositories:
            - id: deck-os
              name: deck-os
              baseurl: http://{{ .vars.serverURL }}/packages/rpm/{{ .vars.release }}
              enabled: true
              gpgcheck: false
            - id: deck-k8s
              name: deck-k8s
              baseurl: http://{{ .vars.serverURL }}/packages/rpm-k8s/{{ .vars.release }}
              enabled: true
              gpgcheck: false
      - id: refresh-offline-repo-yum
        when: vars.osFamily == "rhel"
        apiVersion: deck/v1alpha1
        kind: RefreshRepository
        spec:
          manager: dnf
          clean: true
          update: true
      - id: install-k8s-deps
        apiVersion: deck/v1alpha1
        kind: InstallPackage
        spec:
          packages: [containerd, kubelet, kubeadm, kubectl]
      - id: configure-containerd-runtime
        apiVersion: deck/v1alpha1
        kind: WriteContainerdConfig
        spec:
          path: /etc/containerd/config.toml
          configPath: /etc/containerd/certs.d
          systemdCgroup: true
      - id: configure-containerd-registry-hosts
        apiVersion: deck/v1alpha1
        kind: WriteContainerdRegistryHosts
        spec:
          path: /etc/containerd/certs.d
          registryHosts:
            - registry: registry.k8s.io
              server: https://registry.k8s.io
              host: http://{{ .vars.registryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
      - id: restart-containerd
        apiVersion: deck/v1alpha1
        kind: ManageService
        spec:
          name: containerd
          enabled: true
          state: restarted
      - id: start-kubelet
        apiVersion: deck/v1alpha1
        kind: ManageService
        spec:
          name: kubelet
          enabled: true
          state: started
      - id: kubeadm-init
        apiVersion: deck/v1alpha1
        kind: InitKubeadm
        spec:
          outputJoinFile: /tmp/deck/join.txt
          criSocket: unix:///run/containerd/containerd.sock
          ignorePreflightErrors: [swap]
          extraArgs: ["--kubernetes-version", "{{ .vars.kubernetesVersion }}"]
