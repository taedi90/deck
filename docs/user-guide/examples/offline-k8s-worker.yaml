version: v1alpha1
vars:
  role: worker
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: Swap
        spec:
          disable: true
          persist: true
      - id: prep-kernel-module-overlay
        apiVersion: deck/v1alpha1
        kind: KernelModule
        spec:
          name: overlay
          load: true
          persist: true
          persistFile: /etc/modules-load.d/k8s.conf
      - id: prep-kernel-module-br-netfilter
        apiVersion: deck/v1alpha1
        kind: KernelModule
        spec:
          name: br_netfilter
          load: true
          persist: true
          persistFile: /etc/modules-load.d/k8s.conf
      - id: prep-sysctl
        apiVersion: deck/v1alpha1
        kind: Sysctl
        spec:
          writeFile: /etc/sysctl.d/99-kubernetes-cri.conf
          apply: true
          values:
            net.bridge.bridge-nf-call-iptables: 1
            net.bridge.bridge-nf-call-ip6tables: 1
            net.ipv4.ip_forward: 1
      - id: prep-containerd-config
        apiVersion: deck/v1alpha1
        kind: WriteContainerdConfig
        spec:
          path: /etc/containerd/config.toml
          rawSettings:
            - op: set
              rawPath: plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options.SystemdCgroup
              value: true
      - id: prep-containerd-runtime
        apiVersion: deck/v1alpha1
        kind: ManageService
        spec:
          name: containerd
          enabled: true
          state: started
      - id: prep-kubelet-runtime
        apiVersion: deck/v1alpha1
        kind: ManageService
        spec:
          name: kubelet
          enabled: true
          state: started
      - id: kubeadm-join
        apiVersion: deck/v1alpha1
        kind: JoinKubeadm
        spec:
          joinFile: /tmp/deck/join-real.txt
          extraArgs: ["--cri-socket", "unix:///run/containerd/containerd.sock", "--ignore-preflight-errors=Swap"]
