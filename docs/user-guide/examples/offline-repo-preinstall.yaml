version: v1alpha1
vars:
  serverURL: 192.168.56.1:8080
  release: ubuntu2204
phases:
  - name: install
    steps:
      - id: write-apt-offline-config
        when: runtime.host.os.family == "debian"
        apiVersion: deck/v1alpha1
        kind: WriteFile
        spec:
          path: /etc/apt/apt.conf.d/99offline
          mode: "0644"
          template: |
            APT::Get::AllowUnauthenticated "true";
            Acquire::AllowInsecureRepositories "true";
            Acquire::AllowDowngradeToInsecureRepositories "true";
      - id: apply-offline-repo-config-deb
        when: runtime.host.os.family == "debian"
        apiVersion: deck/v1alpha1
        kind: ConfigureRepository
        spec:
          format: deb
          replaceExisting: true
          repositories:
            - id: offline-repo
              baseurl: http://{{ .vars.serverURL }}/packages/deb/{{ .vars.release }}
              trusted: true
      - id: refresh-offline-repo-cache-deb
        when: runtime.host.os.family == "debian"
        apiVersion: deck/v1alpha1
        kind: RefreshRepository
        spec:
          manager: apt
          clean: true
          update: true
          restrictToRepos:
            - /etc/apt/sources.list.d/deck-offline.list
      - id: apply-offline-repo-config-rpm
        when: runtime.host.os.family == "rhel"
        apiVersion: deck/v1alpha1
        kind: ConfigureRepository
        spec:
          format: rpm
          replaceExisting: true
          repositories:
            - id: offline-repo
              name: Offline repo for kubespray
              baseurl: http://{{ .vars.serverURL }}/packages/rpm/{{ .vars.release }}
              enabled: true
              gpgcheck: false
              extra:
                module_hotfixes: true
      - id: refresh-offline-repo-cache-rpm
        when: runtime.host.os.family == "rhel"
        apiVersion: deck/v1alpha1
        kind: RefreshRepository
        spec:
          manager: dnf
          clean: true
          update: true
          restrictToRepos: [offline-repo]
      - id: disable-firewalld-and-ufw
        apiVersion: deck/v1alpha1
        kind: ManageService
        spec:
          names: [firewalld, ufw]
          enabled: false
          state: stopped
          ifExists: true
          ignoreMissing: true
