version: v1alpha1
vars:
  serverRegistryHost: 127.0.0.1:5000
phases:
  - name: install
    steps:
      - id: prep-containerd-certs-dir
        apiVersion: deck/v1alpha1
        kind: EnsureDirectory
        spec:
          path: /etc/containerd/certs.d
      - id: prep-containerd-certsd-config
        apiVersion: deck/v1alpha1
        kind: WriteContainerdConfig
        spec:
          path: /etc/containerd/config.toml
          rawSettings:
            - op: set
              rawPath: plugins."io.containerd.grpc.v1.cri".registry.config_path
              value: /etc/containerd/certs.d
      - id: prep-containerd-registry-hosts
        apiVersion: deck/v1alpha1
        kind: WriteContainerdRegistryHosts
        spec:
          path: /etc/containerd/certs.d
          registryHosts:
            - registry: registry.k8s.io
              server: http://{{ .vars.serverRegistryHost }}
              host: http://{{ .vars.serverRegistryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
            - registry: docker.io
              server: http://{{ .vars.serverRegistryHost }}
              host: http://{{ .vars.serverRegistryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
            - registry: quay.io
              server: http://{{ .vars.serverRegistryHost }}
              host: http://{{ .vars.serverRegistryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
            - registry: ghcr.io
              server: http://{{ .vars.serverRegistryHost }}
              host: http://{{ .vars.serverRegistryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
            - registry: gcr.io
              server: http://{{ .vars.serverRegistryHost }}
              host: http://{{ .vars.serverRegistryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
            - registry: k8s.gcr.io
              server: http://{{ .vars.serverRegistryHost }}
              host: http://{{ .vars.serverRegistryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
      - id: restart-containerd
        apiVersion: deck/v1alpha1
        kind: ManageService
        spec:
          name: containerd
          state: restarted
