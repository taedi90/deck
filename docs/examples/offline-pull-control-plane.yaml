role: apply
version: v1alpha1
vars:
  serverURL: 192.168.56.1:8080
  release: ubuntu2204
  osFamily: debian
  registryHost: 192.168.56.1:5000
  kubernetesVersion: v1.30.1
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: Swap
        spec:
          disable: true
          persist: false
      - id: configure-offline-repo-apt
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: RepoConfig
        spec:
          format: apt
          replaceExisting: true
          refreshCache:
            enabled: true
            clean: true
          repositories:
            - id: deck-os
              baseurl: http://{{ .vars.serverURL }}/packages/apt/{{ .vars.release }}
              trusted: true
            - id: deck-k8s
              baseurl: http://{{ .vars.serverURL }}/packages/apt-k8s/{{ .vars.release }}
              trusted: true
      - id: configure-offline-repo-yum
        when: vars.osFamily == "rhel"
        apiVersion: deck/v1alpha1
        kind: RepoConfig
        spec:
          format: yum
          replaceExisting: true
          refreshCache:
            enabled: true
            clean: true
          repositories:
            - id: deck-os
              name: deck-os
              baseurl: http://{{ .vars.serverURL }}/packages/yum/{{ .vars.release }}
              enabled: true
              gpgcheck: false
            - id: deck-k8s
              name: deck-k8s
              baseurl: http://{{ .vars.serverURL }}/packages/yum-k8s/{{ .vars.release }}
              enabled: true
              gpgcheck: false
      - id: install-k8s-deps
        apiVersion: deck/v1alpha1
        kind: InstallPackages
        spec:
          packages: [containerd, kubelet, kubeadm, kubectl]
      - id: configure-containerd-runtime
        apiVersion: deck/v1alpha1
        kind: ContainerdConfig
        spec:
          path: /etc/containerd/config.toml
          configPath: /etc/containerd/certs.d
          systemdCgroup: true
          registryHosts:
            - registry: registry.k8s.io
              server: https://registry.k8s.io
              host: http://{{ .vars.registryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
      - id: restart-containerd
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          name: containerd
          enabled: true
          state: restarted
      - id: start-kubelet
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          name: kubelet
          enabled: true
          state: started
      - id: kubeadm-init
        apiVersion: deck/v1alpha1
        kind: KubeadmInit
        spec:
          mode: real
          outputJoinFile: /tmp/deck/join.txt
          criSocket: unix:///run/containerd/containerd.sock
          ignorePreflightErrors: [Swap]
          extraArgs: ["--kubernetes-version", "{{ .vars.kubernetesVersion }}"]
