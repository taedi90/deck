role: apply
version: v1alpha1
vars:
  serverURL: 192.168.56.1:8080
  release: ubuntu2204
  registryHost: 192.168.56.1:5000
  kubernetesVersion: v1.30.1
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["bash", "-lc", "swapoff -a"]
      - id: write-apt-offline-repo
        apiVersion: deck/v1alpha1
        kind: WriteFile
        spec:
          path: /tmp/deck-offline-apt.list
          mode: "0644"
          contentFromTemplate: |
            deb [trusted=yes] http://{{ .vars.serverURL }}/packages/apt/{{ .vars.release }} ./
            deb [trusted=yes] http://{{ .vars.serverURL }}/packages/apt-k8s/{{ .vars.release }} ./
      - id: write-yum-offline-repo
        apiVersion: deck/v1alpha1
        kind: WriteFile
        spec:
          path: /tmp/deck-offline.repo
          mode: "0644"
          contentFromTemplate: |
            [deck-os]
            name=deck-os
            baseurl=http://{{ .vars.serverURL }}/packages/yum/{{ .vars.release }}
            enabled=1
            gpgcheck=0

            [deck-k8s]
            name=deck-k8s
            baseurl=http://{{ .vars.serverURL }}/packages/yum-k8s/{{ .vars.release }}
            enabled=1
            gpgcheck=0
      - id: apply-offline-repo-config
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              if [[ -d /etc/apt ]]; then
                mkdir -p /etc/apt/sources.list.d
                rm -f /etc/apt/sources.list.d/*.list
                cp -f /tmp/deck-offline-apt.list /etc/apt/sources.list.d/offline.list
                apt-get clean
                apt-get update
              elif [[ -d /etc/yum.repos.d ]]; then
                cp -f /tmp/deck-offline.repo /etc/yum.repos.d/deck-offline.repo
                dnf clean all
                dnf makecache
              else
                echo "unsupported distro" >&2
                exit 1
              fi
      - id: install-k8s-deps
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              if [[ -d /etc/apt ]]; then
                DEBIAN_FRONTEND=noninteractive apt-get install -y containerd kubelet kubeadm kubectl
              elif [[ -d /etc/yum.repos.d ]]; then
                dnf install -y containerd kubelet kubeadm kubectl
              else
                echo "unsupported distro" >&2
                exit 1
              fi
      - id: write-containerd-mirror-registry-k8s
        apiVersion: deck/v1alpha1
        kind: WriteFile
        spec:
          path: /etc/containerd/certs.d/registry.k8s.io/hosts.toml
          mode: "0644"
          contentFromTemplate: |
            server = "https://registry.k8s.io"

            [host."http://{{ .vars.registryHost }}"]
              capabilities = ["pull", "resolve"]
              skip_verify = true
      - id: configure-containerd-runtime
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              mkdir -p /etc/containerd
              containerd config default > /etc/containerd/config.toml
              sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
              systemctl daemon-reload
              systemctl enable --now containerd kubelet
              systemctl restart containerd
      - id: kubeadm-init
        apiVersion: deck/v1alpha1
        kind: KubeadmInit
        spec:
          mode: real
          outputJoinFile: /tmp/deck/join.txt
          criSocket: unix:///run/containerd/containerd.sock
          ignorePreflightErrors: [Swap]
          extraArgs: ["--kubernetes-version", "{{ .vars.kubernetesVersion }}"]
