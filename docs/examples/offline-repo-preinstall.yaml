role: apply
version: v1alpha1
vars:
  serverURL: 192.168.56.1:8080
  release: ubuntu2204
  osFamily: debian
phases:
  - name: install
    steps:
      - id: write-apt-offline-config
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: WriteFile
        spec:
          path: /etc/apt/apt.conf.d/99offline
          mode: "0644"
          contentFromTemplate: |
            APT::Get::AllowUnauthenticated "true";
            Acquire::AllowInsecureRepositories "true";
            Acquire::AllowDowngradeToInsecureRepositories "true";
      - id: apply-offline-repo-config-apt
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: RepoConfig
        spec:
          format: apt
          replaceExisting: true
          repositories:
            - id: offline-repo
              baseurl: http://{{ .vars.serverURL }}/packages/apt/{{ .vars.release }}
              trusted: true
      - id: apply-offline-repo-config-yum
        when: vars.osFamily == "rhel"
        apiVersion: deck/v1alpha1
        kind: RepoConfig
        spec:
          format: yum
          replaceExisting: true
          repositories:
            - id: offline-repo
              name: Offline repo for kubespray
              baseurl: http://{{ .vars.serverURL }}/packages/yum/{{ .vars.release }}
              enabled: true
              gpgcheck: false
              module_hotfixes: true
      - id: disable-firewalld-and-ufw
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          names: [firewalld, ufw]
          enabled: false
          state: stopped
          ifExists: true
          ignoreMissing: true
