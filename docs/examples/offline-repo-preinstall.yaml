role: apply
version: v1alpha1
vars:
  serverURL: 192.168.56.1:8080
  release: ubuntu2204
  osFamily: debian
phases:
  - name: install
    steps:
      - id: write-apt-offline-config
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: File
        spec:
          action: write
          path: /etc/apt/apt.conf.d/99offline
          mode: "0644"
          contentFromTemplate: |
            APT::Get::AllowUnauthenticated "true";
            Acquire::AllowInsecureRepositories "true";
            Acquire::AllowDowngradeToInsecureRepositories "true";
      - id: apply-offline-repo-config-apt
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: Repository
        spec:
          action: configure
          format: apt
          replaceExisting: true
          repositories:
            - id: offline-repo
              baseurl: http://{{ .vars.serverURL }}/packages/deb/{{ .vars.release }}
              trusted: true
      - id: refresh-offline-repo-cache-apt
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: PackageCache
        spec:
          manager: apt
          clean: true
          update: true
          restrictToRepos:
            - /etc/apt/sources.list.d/deck-offline.list
      - id: apply-offline-repo-config-yum
        when: vars.osFamily == "rhel"
        apiVersion: deck/v1alpha1
        kind: Repository
        spec:
          action: configure
          format: yum
          replaceExisting: true
          repositories:
            - id: offline-repo
              name: Offline repo for kubespray
              baseurl: http://{{ .vars.serverURL }}/packages/rpm/{{ .vars.release }}
              enabled: true
              gpgcheck: false
              module_hotfixes: true
      - id: refresh-offline-repo-cache-yum
        when: vars.osFamily == "rhel"
        apiVersion: deck/v1alpha1
        kind: PackageCache
        spec:
          manager: dnf
          clean: true
          update: true
          restrictToRepos: [offline-repo]
      - id: disable-firewalld-and-ufw
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          names: [firewalld, ufw]
          enabled: false
          state: stopped
          ifExists: true
          ignoreMissing: true
