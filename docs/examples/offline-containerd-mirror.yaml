version: v1alpha1
vars:
  serverRegistryHost: 127.0.0.1:5000
  seedRegistries: "registry.k8s.io docker.io quay.io ghcr.io gcr.io k8s.gcr.io"
context:
  stateFile: /tmp/deck/state-offline-containerd-mirror.json
phases:
  - name: install
    steps:
      - id: prep-containerd-certsd-config
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - bash
            - -lc
            - |
              mkdir -p /etc/containerd/certs.d /etc/containerd
              if [ ! -f /etc/containerd/config.toml ]; then
                containerd config default > /etc/containerd/config.toml
              fi
              if grep -q 'config_path = ""' /etc/containerd/config.toml; then
                sed -i 's|config_path = ""|config_path = "/etc/containerd/certs.d"|' /etc/containerd/config.toml
              elif ! grep -q 'config_path = "/etc/containerd/certs.d"' /etc/containerd/config.toml; then
                echo 'containerd registry config_path not configured' >&2
                exit 1
              fi
      - id: write-containerd-mirror-hosts
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - bash
            - -lc
            - |
              for registry in { .vars.seedRegistries }; do
                install -d "/etc/containerd/certs.d/$registry"
                cat > "/etc/containerd/certs.d/$registry/hosts.toml" <<EOF
              server = "http://{ .vars.serverRegistryHost }"

              [host."http://{ .vars.serverRegistryHost }"]
                capabilities = ["pull", "resolve"]
                skip_verify = true
              EOF
              done
      - id: restart-containerd
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["bash", "-lc", "systemctl restart containerd"]
      - id: verify-containerd-active
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["bash", "-lc", "systemctl is-active --quiet containerd"]
