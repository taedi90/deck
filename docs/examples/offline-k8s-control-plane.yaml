role: apply
version: v1alpha1
vars:
  role: control-plane
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: Swap
        spec:
          disable: true
          persist: true
      - id: prep-kernel-module-overlay
        apiVersion: deck/v1alpha1
        kind: KernelModule
        spec:
          name: overlay
          load: true
          persist: true
          persistFile: /etc/modules-load.d/k8s.conf
      - id: prep-kernel-module-br-netfilter
        apiVersion: deck/v1alpha1
        kind: KernelModule
        spec:
          name: br_netfilter
          load: true
          persist: true
          persistFile: /etc/modules-load.d/k8s.conf
      - id: prep-sysctl-file
        apiVersion: deck/v1alpha1
        kind: InstallFile
        spec:
          path: /etc/sysctl.d/99-kubernetes-cri.conf
          content: |
            net.bridge.bridge-nf-call-iptables = 1
            net.bridge.bridge-nf-call-ip6tables = 1
            net.ipv4.ip_forward = 1
      - id: prep-sysctl-apply
        apiVersion: deck/v1alpha1
        kind: SysctlApply
        spec:
          file: /etc/sysctl.d/99-kubernetes-cri.conf
      - id: prep-containerd-config
        apiVersion: deck/v1alpha1
        kind: ContainerdConfig
        spec:
          path: /etc/containerd/config.toml
          systemdCgroup: true
      - id: prep-containerd-runtime
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          name: containerd
          enabled: true
          state: started
      - id: prep-kubelet-runtime
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          name: kubelet
          enabled: true
          state: started
      - id: kubeadm-init
        apiVersion: deck/v1alpha1
        kind: KubeadmInit
        spec:
          mode: real
          outputJoinFile: /tmp/deck/join-real.txt
          podNetworkCIDR: 10.244.0.0/16
          criSocket: unix:///run/containerd/containerd.sock
          ignorePreflightErrors: [Swap]
          extraArgs: ["--kubernetes-version", "v1.30.1"]
      - id: setup-kubeconfig
        apiVersion: deck/v1alpha1
        kind: EnsureDir
        spec:
          path: /home/vagrant/.kube
      - id: copy-kubeconfig
        apiVersion: deck/v1alpha1
        kind: CopyFile
        spec:
          src: /etc/kubernetes/admin.conf
          dest: /home/vagrant/.kube/config
          owner: vagrant
          group: vagrant
          mode: "0644"
