role: apply
version: v1alpha1
vars:
  role: control-plane
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["bash", "-lc", "swapoff -a"]
      - id: prep-kernel-modules-persist
        apiVersion: deck/v1alpha1
        kind: Modprobe
        spec:
          modules: [overlay, br_netfilter]
          persistFile: /etc/modules-load.d/k8s.conf
      - id: prep-kernel-modules-load
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["bash", "-lc", "modprobe overlay && modprobe br_netfilter"]
      - id: prep-sysctl-file
        apiVersion: deck/v1alpha1
        kind: Sysctl
        spec:
          writeFile: /etc/sysctl.d/99-kubernetes-cri.conf
          values:
            net.bridge.bridge-nf-call-iptables: 1
            net.bridge.bridge-nf-call-ip6tables: 1
            net.ipv4.ip_forward: 1
      - id: prep-sysctl-apply
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["bash", "-lc", "sysctl --system"]
      - id: prep-containerd-config
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - "bash"
            - "-lc"
            - "mkdir -p /etc/containerd && containerd config default > /etc/containerd/config.toml && sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml"
      - id: prep-kubelet-runtime
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["bash", "-lc", "systemctl enable --now containerd kubelet"]
      - id: kubeadm-init
        apiVersion: deck/v1alpha1
        kind: KubeadmInit
        spec:
          mode: real
          outputJoinFile: /tmp/deck/join-real.txt
          podNetworkCIDR: 10.244.0.0/16
          criSocket: unix:///run/containerd/containerd.sock
          ignorePreflightErrors: [Swap]
          extraArgs: ["--kubernetes-version", "v1.30.1"]
      - id: setup-kubeconfig
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command:
            - "bash"
            - "-lc"
            - "mkdir -p /home/vagrant/.kube && cp -f /etc/kubernetes/admin.conf /home/vagrant/.kube/config && chown -R vagrant:vagrant /home/vagrant/.kube"
