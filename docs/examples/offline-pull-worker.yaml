role: apply
version: v1alpha1
vars:
  serverURL: 192.168.56.1:8080
  release: ubuntu2204
  osFamily: debian
  registryHost: 192.168.56.1:5000
  joinFile: /tmp/deck/join.txt
phases:
  - name: install
    steps:
      - id: prep-disable-swap
        apiVersion: deck/v1alpha1
        kind: Swap
        spec:
          disable: true
          persist: false
      - id: configure-offline-repo-apt
        when: vars.osFamily == "debian"
        apiVersion: deck/v1alpha1
        kind: Repository
        spec:
          action: configure
          format: apt
          replaceExisting: true
          refreshCache:
            enabled: true
            clean: true
          repositories:
            - id: deck-os
              baseurl: http://{{ .vars.serverURL }}/packages/deb/{{ .vars.release }}
              trusted: true
            - id: deck-k8s
              baseurl: http://{{ .vars.serverURL }}/packages/deb-k8s/{{ .vars.release }}
              trusted: true
      - id: configure-offline-repo-yum
        when: vars.osFamily == "rhel"
        apiVersion: deck/v1alpha1
        kind: Repository
        spec:
          action: configure
          format: yum
          replaceExisting: true
          refreshCache:
            enabled: true
            clean: true
          repositories:
            - id: deck-os
              name: deck-os
              baseurl: http://{{ .vars.serverURL }}/packages/rpm/{{ .vars.release }}
              enabled: true
              gpgcheck: false
            - id: deck-k8s
              name: deck-k8s
              baseurl: http://{{ .vars.serverURL }}/packages/rpm-k8s/{{ .vars.release }}
              enabled: true
              gpgcheck: false
      - id: install-k8s-deps
        apiVersion: deck/v1alpha1
        kind: Packages
        spec:
          action: install
          packages: [containerd, kubelet, kubeadm, kubectl]
      - id: configure-containerd-runtime
        apiVersion: deck/v1alpha1
        kind: Containerd
        spec:
          path: /etc/containerd/config.toml
          configPath: /etc/containerd/certs.d
          systemdCgroup: true
          registryHosts:
            - registry: registry.k8s.io
              server: https://registry.k8s.io
              host: http://{{ .vars.registryHost }}
              capabilities: [pull, resolve]
              skipVerify: true
      - id: restart-containerd
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          name: containerd
          enabled: true
          state: restarted
      - id: start-kubelet
        apiVersion: deck/v1alpha1
        kind: Service
        spec:
          name: kubelet
          enabled: true
          state: started
      - id: kubeadm-join
        apiVersion: deck/v1alpha1
        kind: Kubeadm
        spec:
          action: join
          mode: real
          joinFile: "{{ .vars.joinFile }}"
          extraArgs: ["--cri-socket", "unix:///run/containerd/containerd.sock", "--ignore-preflight-errors=Swap"]
