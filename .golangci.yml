version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - gocritic
    - gosec
    - errcheck
    - govet
    - bodyclose
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: '.*_test\.go'
        linters:
          - gosec
        text: 'G(204|301|302|304|306)'
      - path: 'internal/hostfs/host_path\.go'
        linters:
          - gosec
        text: 'G703'
      - path: 'internal/server/http_response\.go'
        linters:
          - gosec
        text: 'G705'
      - path: 'internal/fsutil/walk\.go'
        linters:
          - gosec
        text: 'G122'
      - path: 'internal/executil/(system|workflow)\.go'
        linters:
          - gosec
        text: 'G204'
      - path: 'internal/fsutil/safe_paths\.go'
        linters:
          - gosec
        text: 'G304'
      - path: 'internal/filemode/filemode\.go'
        linters:
          - gosec
        text: 'G304'

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      custom-order: true
      sections:
        - standard
        - default
        - prefix(github.com/taedi90/deck)
    gofumpt:
      module-path: github.com/taedi90/deck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
